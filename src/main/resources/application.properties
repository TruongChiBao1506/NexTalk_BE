spring.application.name=NexTalk_BE

# Database Connection
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.uuid-representation=standard
spring.mongodb.uuid-representation=standard


# Mail configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT configurations
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration-ms=900000
# 15 mins = 15 * 60 * 1000 = 900,000 ms
app.jwt.refresh-expiration-ms=604800000
# 7 days = 7 * 24 * 60 * 60 * 1000 = 604,800,000 ms

# Server configuration
server.port=${PORT:8080}

# CORS - allowed origins (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.url=${CLOUDINARY_URL:}

# Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}

# Agora configuration
app.agora.app-id=${AGORA_APP_ID:01771010db7946528839c48bdabe28f5}
app.agora.app-certificate=${AGORA_APP_CERTIFICATE:ae01a05580b84d5ead93a766235d4e6d}


