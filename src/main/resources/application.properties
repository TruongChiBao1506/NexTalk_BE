spring.application.name=NexTalk_BE

# Database Connection
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.uuid-representation=standard
spring.mongodb.uuid-representation=standard
spring.data.mongodb.auto-index-creation=true


# Mail configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT configurations
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration-ms=900000
# 15 mins = 15 * 60 * 1000 = 900,000 ms
app.jwt.refresh-expiration-ms=604800000
# 7 days = 7 * 24 * 60 * 60 * 1000 = 604,800,000 ms

# Server configuration
server.port=${PORT:8080}

# CORS - allowed origins (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}
app.public-base-url=${PUBLIC_BASE_URL:http://localhost:8080}
app.mobile.reset-return-url=${MOBILE_RESET_RETURN_URL:nextalk://reset-password}
app.auth.refresh-cookie-secure=${REFRESH_COOKIE_SECURE:true}
app.auth.refresh-cookie-same-site=${REFRESH_COOKIE_SAME_SITE:None}
app.auth.refresh-cookie-partitioned=${REFRESH_COOKIE_PARTITIONED:true}
server.forward-headers-strategy=framework

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.url=${CLOUDINARY_URL:}

# Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:3s}
spring.data.redis.timeout=${REDIS_COMMAND_TIMEOUT:2s}
app.redis.presence-ttl=${REDIS_PRESENCE_TTL:120s}
app.redis.last-seen-ttl=${REDIS_LAST_SEEN_TTL:30d}
app.redis.voice-ttl=${REDIS_VOICE_TTL:120s}

# Agora configuration
app.agora.app-id=${AGORA_APP_ID:}
app.agora.app-certificate=${AGORA_APP_CERTIFICATE:}

# Conversation summary via n8n
app.summary.n8n-webhook-url=${N8N_SUMMARY_WEBHOOK_URL:}
app.summary.message-limit=${SUMMARY_MESSAGE_LIMIT:15}
app.summary.preferred-model=${SUMMARY_PREFERRED_MODEL:gemini-2.5-flash}
app.summary.gemini-api-key=${GEMINI_API_KEY:}
app.summary.gemini-model=${SUMMARY_GEMINI_MODEL:gemini-2.5-flash}
app.summary.gemini-url=${SUMMARY_GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={key}}
app.summary.max-output-tokens=${SUMMARY_MAX_OUTPUT_TOKENS:1024}

# AI assistant mention bot via n8n. This must be a dedicated workflow, not the summary workflow.
app.ai-bot.n8n-webhook-url=${N8N_AI_BOT_WEBHOOK_URL:}
app.ai-bot.message-limit=${AI_BOT_MESSAGE_LIMIT:12}
app.ai-bot.gemini-api-key=${GEMINI_API_KEY:}
app.ai-bot.gemini-model=${AI_BOT_GEMINI_MODEL:gemini-2.5-flash}
app.ai-bot.gemini-url=https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={key}
app.ai-bot.max-output-tokens=${AI_BOT_MAX_OUTPUT_TOKENS:2048}

# AI rate limits (per backend instance)
app.rate-limit.ai-summary.limit=${AI_SUMMARY_RATE_LIMIT:3}
app.rate-limit.ai-summary.window-seconds=${AI_SUMMARY_RATE_WINDOW_SECONDS:300}
app.rate-limit.ai-bot.limit=${AI_BOT_RATE_LIMIT:10}
app.rate-limit.ai-bot.window-seconds=${AI_BOT_RATE_WINDOW_SECONDS:60}
app.rate-limit.ai-moderation.limit=${AI_MODERATION_RATE_LIMIT:5}
app.rate-limit.ai-moderation.window-seconds=${AI_MODERATION_RATE_WINDOW_SECONDS:3600}

# Multipart file upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# Google OAuth2
google.client.id=${GOOGLE_CLIENT_ID:}
