spring.application.name=NexTalk_BE_Test

# Database Connection (MongoDB Test Database)
SPRING_DATA_MONGODB_URI=mongodb://localhost:27017/nextalk_test
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.uuid-representation=standard
spring.mongodb.uuid-representation=standard

# Mock Mail (disables actual SMTP operations during test)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT configurations
app.jwt.secret=407f3f6c8d76a2b8e3a4b9c1d0e8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.frontend.base-url=http://localhost:3000
app.public-base-url=http://localhost:8080
app.mobile.reset-return-url=nextalk://reset-password
app.auth.refresh-cookie-secure=false
google.client.id=test-google-client

# Cloudinary Config (Test placeholders)
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-key
cloudinary.api-secret=test-secret

# Redis Test configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.ssl.enabled=false
